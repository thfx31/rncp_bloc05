name: lint-iac

on:
  pull_request:
    paths: ["terraform/**", "ansible/**"]
  push:
    branches: [main]
    paths: ["terraform/**", "ansible/**"]
  workflow_dispatch: {}

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: terraform fmt/validate (cluster)
        working-directory: terraform/cluster
        run: |
          terraform init -backend=false
          terraform fmt -check -recursive
          terraform validate

      - name: terraform fmt/validate (vault)
        working-directory: terraform/vault
        run: |
          terraform init -backend=false
          terraform fmt -check -recursive
          terraform validate

      - name: Installer tfsec
        run: |
          curl -sL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

      - name: tfsec
        # soft_fail au départ (cf. poc-vs-prod.md) — le temps de trier les
        # faux positifs avant de passer en hard-fail
        continue-on-error: true
        run: |
          tfsec terraform --format json --out tfsec-report.json
          tfsec terraform

      - name: Installer Checkov
        run: pip install checkov

      - name: Checkov (terraform)
        continue-on-error: true
        run: |
          checkov --compact --directory terraform --framework terraform \
            --output cli --output json \
            --output-file-path console,checkov-report-terraform.json

      - name: Archiver les rapports (terraform)
        uses: actions/upload-artifact@v4
        with:
          name: lint-iac-terraform-reports
          path: |
            tfsec-report.json
            checkov-report-terraform.json

  ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ansible-lint
        # soft_fail au départ, comme tfsec/checkov ci-dessus (cf. poc-vs-prod.md)
        # — le temps de trier les faux positifs avant de passer en hard-fail
        continue-on-error: true
        run: |
          pip install ansible-lint
          ansible-lint --parseable ansible/ | tee ansible-lint-report.txt

      - name: Installer Checkov
        run: pip install checkov

      - name: Checkov (ansible)
        continue-on-error: true
        run: |
          checkov --compact --directory ansible --framework ansible \
            --output cli --output json \
            --output-file-path console,checkov-report-ansible.json

      - name: Archiver les rapports (ansible)
        uses: actions/upload-artifact@v4
        with:
          name: lint-iac-ansible-reports
          path: |
            ansible-lint-report.txt
            checkov-report-ansible.json
