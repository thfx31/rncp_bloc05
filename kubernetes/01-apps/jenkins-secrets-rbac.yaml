# Permet au plugin kubernetes-credentials-provider (Jenkins) de découvrir les
# Secrets K8s labellisés jenkins.io/credentials-type dans le namespace jenkins
# et de les exposer comme credentials Jenkins, sans jamais les stocker dans
# le repo ni les créer à la main dans l'UI.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-read-credentials
  namespace: jenkins
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-read-credentials
  namespace: jenkins
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-read-credentials
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: jenkins
