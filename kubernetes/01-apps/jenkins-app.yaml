# Vérifier avant rebuild : https://github.com/jenkinsci/helm-charts/releases
#
# Le Secret "jenkins-admin-secret" (namespace jenkins, clés jenkins-admin-user
# et jenkins-admin-password) n'est PAS dans ce repo — créé via
# `make k8s-apps-secrets`, jamais committé.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.jenkins.io
    chart: jenkins
    targetRevision: "5.9.32"
    helm:
      values: |
        controller:
          admin:
            existingSecret: jenkins-admin-secret
          containerEnv:
            - name: TZ
              value: Europe/Paris
          nodeSelector:
            kubernetes.io/hostname: rncp-bc05-worker-02
          ingress:
            enabled: true
            ingressClassName: nginx
            hostName: jenkins.k8s.yplank.fr
            tls:
              - secretName: jenkins-tls
                hosts:
                  - jenkins.k8s.yplank.fr
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2Gi
          installPlugins:
            - kubernetes:latest
            - workflow-aggregator:latest
            - git:latest
            - configuration-as-code:latest
          additionalPlugins:
            - gitlab-plugin:latest
            - sonar:latest
            - docker-workflow:latest
            - blueocean:latest
            - pipeline-stage-view:latest
            - kubernetes-credentials-provider:latest
            - job-dsl:latest
          JCasC:
            configScripts:
              # Définit le job pipeline firmware-poc de façon déclarative
              # (Job DSL) — survit à un rebuild complet, pas de clic UI.
              firmware-poc-job: |
                jobs:
                  - script: >
                      pipelineJob('firmware-poc') {
                        definition {
                          cpsScm {
                            scm {
                              git {
                                remote {
                                  url('https://gitlab.k8s.yplank.fr/poc-ci/firmware-poc.git')
                                  credentials('gitlab-credentials')
                                }
                                branch('*/main')
                              }
                            }
                            scriptPath('Jenkinsfile')
                          }
                        }
                        triggers {
                          gitlabPush {
                            buildOnPushEvents(true)
                            buildOnMergeRequestEvents(false)
                          }
                        }
                      }
              # Variables globales attendues par app/firmware-poc/Jenkinsfile
              # (HARBOR_URL, SONAR_HOST_URL) — déclaratif, pas de saisie manuelle
              # dans Manage Jenkins > System après un rebuild.
              global-env-vars: |
                jenkins:
                  globalNodeProperties:
                    - envVars:
                        env:
                          - key: "HARBOR_URL"
                            value: "harbor.k8s.yplank.fr"
                          - key: "SONAR_HOST_URL"
                            value: "https://sonarqube.k8s.yplank.fr"
              # Déclare le serveur SonarQube "sonarqube" utilisé par le stage
              # SonarQube du Jenkinsfile. Le credential sonarqube-token doit
              # exister (étape manuelle, cf. docs/apps-stack.md) sinon Jenkins
              # démarre quand même mais l'installation reste non fonctionnelle
              # tant que le Secret n'est pas créé.
              sonarqube-server: |
                unclassified:
                  sonarGlobalConfiguration:
                    installations:
                      - name: "sonarqube"
                        serverUrl: "https://sonarqube.k8s.yplank.fr"
                        credentialsId: "sonarqube-token"
        persistence:
          enabled: true
          storageClass: local-path
          size: 10Gi
        agent:
          enabled: true
          # Agents de build sur worker-01, pour ne pas concurrencer Harbor/le
          # controller Jenkins (worker-02) sur le même node
          nodeSelector:
            kubernetes.io/hostname: rncp-bc05-worker-01
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
